name: 'Docker Multi-Arch Setup'
description: 'Container registry login, QEMU, and Buildx setup shared across sava services.'

inputs:
  registry:
    description: 'Container registry to log in to.'
    required: false
    default: 'ghcr.io'
  username:
    description: 'Registry username (defaults to github.actor).'
    required: false
    default: ${{ github.actor }}
  password:
    description: 'Registry password or token (e.g. secrets.GITHUB_TOKEN for ghcr.io, or the gcp-auth access_token output for Artifact Registry).'
    required: true
  qemu_platforms:
    description: 'Comma-separated QEMU platforms to install emulation for. Empty = action default (all).'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8
      with:
        platforms: ${{ inputs.qemu_platforms }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

    - name: Log in to Container Registry
      uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}
