name: Publish Release

on:
  workflow_call:
    inputs:
      maven-central-exclude-checksums:
        description: 'Comma-separated checksum types to exclude from the Maven Central bundle (e.g. "md5,sha1"). Leave empty to keep all.'
        required: false
        type: string
        default: ''
    secrets:
      READ_SAVA_PACKAGES:
        description: Token used to read sava GitHub Packages.
        required: false
      GPG_PUBLISH_SECRET:
        description: GPG secret key used to sign published artifacts.
        required: true
      GPG_PUBLISH_PHRASE:
        description: Passphrase for the GPG signing key.
        required: true
      MAVEN_CENTRAL_TOKEN:
        description: Token used to publish to Maven Central.
        required: true
      MAVEN_CENTRAL_SECRET:
        description: Secret used to publish to Maven Central.
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - id: setup
        uses: sava-software/sava-build@main
        with:
          default-java-version: ${{ vars.JAVA_VERSION }}
          jdk-src: ${{ vars.JDK_SRC }}
          gradle-java-version: ${{ vars.GRADLE_JAVA_VERSION }}

      - name: Check
        run: ./gradlew --stacktrace -Psign=true -PjavaVersion=${{ steps.setup.outputs.java-version }} -Pversion=${{ github.ref_name }} check
        env:
          ORG_GRADLE_PROJECT_savaGithubPackagesUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_savaGithubPackagesPassword: ${{ secrets.READ_SAVA_PACKAGES }}

      - name: Maven Central
        run: ./gradlew --stacktrace -Psign=true -PjavaVersion=${{ steps.setup.outputs.java-version }} -Pversion=${{ github.ref_name }} -PmavenCentralExcludeChecksums="${{ inputs.maven-central-exclude-checksums }}" :aggregation:publishAggregationToCentralPortal
        env:
          GPG_PUBLISH_SECRET: ${{ secrets.GPG_PUBLISH_SECRET }}
          GPG_PUBLISH_PHRASE: ${{ secrets.GPG_PUBLISH_PHRASE }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.MAVEN_CENTRAL_TOKEN }}
          MAVEN_CENTRAL_SECRET: ${{ secrets.MAVEN_CENTRAL_SECRET }}
          ORG_GRADLE_PROJECT_savaGithubPackagesUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_savaGithubPackagesPassword: ${{ secrets.READ_SAVA_PACKAGES }}

      - name: Github Packages
        run: ./gradlew --stacktrace -Psign=true -PjavaVersion=${{ steps.setup.outputs.java-version }} -Pversion=${{ github.ref_name }} :aggregation:publishToGitHubPackages
        env:
          GPG_PUBLISH_SECRET: ${{ secrets.GPG_PUBLISH_SECRET }}
          GPG_PUBLISH_PHRASE: ${{ secrets.GPG_PUBLISH_PHRASE }}
          ORG_GRADLE_PROJECT_savaGithubPackagesUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_savaGithubPackagesPassword: ${{ secrets.READ_SAVA_PACKAGES }}
          ORG_GRADLE_PROJECT_savaGithubPackagesPublishUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_savaGithubPackagesPublishPassword: ${{ secrets.GITHUB_TOKEN }}
