name: CodeQL Advanced

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: java-kotlin
            build-mode: manual

    env:
      # Cap Gradle + Kotlin daemon heap so they don't get OOM-killed alongside CodeQL's tracer.
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dkotlin.daemon.jvm.options=-Xmx1500m"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: oracle-actions/setup-java@fff43251af9936a0e6a4d5d0946e14f1680e9b6b
        with:
          website: ${{ vars.JDK_SRC }}
          release: ${{ vars.GRADLE_JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
      - uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        name: Initialize CodeQL
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          ram: 3072

      - name: Compile Classes
        if: matrix.build-mode == 'manual'
        run: |
          ./gradlew --no-daemon \
            -Dorg.gradle.workers.max=2 \
            --no-build-cache \
            --no-configuration-cache \
            --rerun-tasks \
            classes

      - uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa
        name: Perform CodeQL Analysis
        with:
          category: "/language:${{ matrix.language }}"
          ram: 3072
