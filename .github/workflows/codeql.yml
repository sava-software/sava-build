name: CodeQL Advanced

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: java-kotlin
            build-mode: manual

    env:
      # Cap Gradle + Kotlin daemon heap so they don't get OOM-killed alongside CodeQL's tracer.
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dkotlin.daemon.jvm.options=-Xmx1500m"

    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # v1.5.0
      - uses: oracle-actions/setup-java@fff43251af9936a0e6a4d5d0946e14f1680e9b6b
        with:
          website: ${{ vars.JDK_SRC }}
          release: ${{ vars.GRADLE_JAVA_VERSION }}
      # v6.1.0
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
      # v4.35.4
      - uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        name: Initialize CodeQL
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          ram: 3072

      - name: Gradle Assemble
        run: ./gradlew --no-daemon -Dorg.gradle.workers.max=2 assemble

      # v4.35.4
      - uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        name: Perform CodeQL Analysis
        with:
          category: "/language:${{ matrix.language }}"
          ram: 3072
